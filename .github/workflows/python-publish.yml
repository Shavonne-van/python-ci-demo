# .github/workflows/python-ci.yml
name: Python CI/CD 自动化流水线

# 触发条件：每次push到main分支时，自动运行流水线
on:
  push:
    branches: [ main ]

# 定义流水线任务
jobs:
  build-and-test:
    runs-on: ubuntu-latest  # 使用GitHub免费的Ubuntu运行环境
    steps:
      # 步骤1：拉取最新代码到运行环境
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：配置Python环境
      - name: 设置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # 缓存pip依赖，加速后续运行

      # 步骤3：安装测试依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # 步骤4：运行单元测试（流水线核心）
      - name: 运行单元测试
        run: pytest test_math.py -v
